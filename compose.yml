services:
  app:
    build:
      context: ./dockerfiles/php-fpm
      dockerfile: Dockerfile
    container_name: back_end
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./app:/var/www
    depends_on:
      - db
    networks:
      - rato-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www
      - ./dockerfiles/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - rato-net

  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - rato-net

networks:
  rato-net:
    driver: bridge

volumes:
  dbdata: